<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NEXAS — Agenție digitală & AI</title>
    <meta name="description" content="NEXAS construiește agenți AI, automatizări, aplicații web și site-uri care nu seamănă cu nimic altceva. Portofoliu: NIRO Agent, NEO Audit SEO, HR Dashboard, Știri AI, Alex AI." />
    <script>
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&');
          });
          window.history.replaceState(null, null,
            decoded[0] + (decoded.slice(1).length > 0 ? '?' + decoded.slice(1).join('&') : '') + l.hash
          );
        }
      }(window.location));
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
